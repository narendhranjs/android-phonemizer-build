name: build-android-phonemizer

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/build.yml

jobs:
  arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build git wget unzip

      - name: Download Android NDK r26b
        run: |
          wget -q -O ndk.zip -L https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
          unzip -q ndk.zip
          echo "NDK_HOME=$GITHUB_WORKSPACE/android-ndk-r26b" >> $GITHUB_ENV

      - name: Clone espeak-ng
        run: |
          git clone --depth 1 https://github.com/espeak-ng/espeak-ng.git

      - name: Build espeak-ng for Android (arm64-v8a)
        run: |
          cd espeak-ng
          cmake -S . -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DANDROID_STL=c++_shared \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/espeak-install \
            -DUSE_ASYNC=OFF \
            -DUSE_MBROLA=OFF
          cmake --build build
          cmake --install build

      - name: Create JNI wrapper source (libpiper_phonemize.so)
        run: |
          mkdir -p jni-wrapper

          cat > jni-wrapper/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.10)
          project(piper_phonemize_jni)

          add_library(piper_phonemize SHARED piper_phonemize_jni.cpp)
          set_target_properties(piper_phonemize PROPERTIES OUTPUT_NAME "piper_phonemize")

          target_compile_features(piper_phonemize PRIVATE cxx_std_17)

          target_include_directories(piper_phonemize PRIVATE
              ${ESPEAK_INSTALL}/include
          )

          target_link_libraries(piper_phonemize
              ${ESPEAK_INSTALL}/lib/libespeak-ng.so
              log
          )
          EOF

          cat > jni-wrapper/piper_phonemize_jni.cpp << 'EOF'
          #include <jni.h>
          #include <string>
          #include <mutex>
          #include <cstdlib>

          #include "espeak-ng/speak_lib.h"

          static std::mutex g_mutex;
          static bool g_inited = false;

          extern "C" JNIEXPORT jboolean JNICALL
          Java_com_spectre_protocol_voicematrix_engines_phonemizer_PiperPhonemizerNative_nativeInit(
              JNIEnv* env, jclass, jstring dataDirPathJ
          ) {
              std::lock_guard<std::mutex> lock(g_mutex);
              if (g_inited) return JNI_TRUE;

              const char* dataDir = env->GetStringUTFChars(dataDirPathJ, nullptr);

              setenv("ESPEAK_DATA_PATH", dataDir, 1);

              int sampleRate = espeak_Initialize(AUDIO_OUTPUT_RETRIEVAL, 0, dataDir, 0);

              env->ReleaseStringUTFChars(dataDirPathJ, dataDir);

              if (sampleRate <= 0) return JNI_FALSE;

              g_inited = true;
              return JNI_TRUE;
          }

          extern "C" JNIEXPORT jstring JNICALL
          Java_com_spectre_protocol_voicematrix_engines_phonemizer_PiperPhonemizerNative_nativePhonemize(
              JNIEnv* env, jclass, jstring textJ, jstring voiceJ
          ) {
              std::lock_guard<std::mutex> lock(g_mutex);
              if (!g_inited) return env->NewStringUTF("");

              const char* text = env->GetStringUTFChars(textJ, nullptr);
              const char* voice = env->GetStringUTFChars(voiceJ, nullptr);

              espeak_SetVoiceByName(voice);

              const void* pText = text;

              int phonemeMode = espeakPHONEMES_IPA;
              const char* phon = espeak_TextToPhonemes(&pText, espeakCHARS_UTF8, phonemeMode);

              std::string out = (phon != nullptr) ? std::string(phon) : std::string("");

              env->ReleaseStringUTFChars(textJ, text);
              env->ReleaseStringUTFChars(voiceJ, voice);

              return env->NewStringUTF(out.c_str());
          }
          EOF

      - name: Build JNI wrapper for Android (arm64-v8a)
        run: |
          mkdir -p jni-wrapper/build
          cmake -S jni-wrapper -B jni-wrapper/build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DANDROID_STL=c++_shared \
            -DESPEAK_INSTALL=$GITHUB_WORKSPACE/espeak-install
          cmake --build jni-wrapper/build

      - name: Collect outputs
        run: |
          mkdir -p out/jniLibs/arm64-v8a

          ESPEAK_SO=$(find $GITHUB_WORKSPACE/espeak-install -name "libespeak-ng.so" | head -n 1)
          PIPER_SO=$(find $GITHUB_WORKSPACE/jni-wrapper/build -name "libpiper_phonemize.so" | head -n 1)

          echo "ESPEAK_SO=$ESPEAK_SO"
          echo "PIPER_SO=$PIPER_SO"

          cp "$ESPEAK_SO" out/jniLibs/arm64-v8a/
          cp "$PIPER_SO" out/jniLibs/arm64-v8a/
          cp "$NDK_HOME/sources/cxx-stl/llvm-libc++/libs/arm64-v8a/libc++_shared.so" out/jniLibs/arm64-v8a/

          mkdir -p out/assets/voicematrix/phonemizer
          cp -r $GITHUB_WORKSPACE/espeak-ng/espeak-ng-data out/assets/voicematrix/phonemizer/espeak-ng-data

          ls -la out/jniLibs/arm64-v8a

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-phonemizer-arm64
          path: out
